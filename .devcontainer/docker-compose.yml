services:

  backend:
    build:
      context: ../backend
    volumes:
      - ../backend:/app
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ../frontend
    volumes:
      - ../frontend:/app
    ports:
      - "5173:5173"

  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: